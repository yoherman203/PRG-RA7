<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>IC Games - Chimpa Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a12; color: white; font-family: 'Orbitron', sans-serif; overflow: hidden; text-align: center; }
        #game-container {
            position: relative; width: 80vw; height: 70vh;
            margin: 20px auto; border: 2px solid #00f2ff;
            background: rgba(0, 242, 255, 0.05); border-radius: 15px;
        }
        .num-box {
            position: absolute; width: 60px; height: 60px;
            background: #00f2ff; color: #0a0a12;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: bold; cursor: pointer;
            border-radius: 8px; user-select: none;
            box-shadow: 0 0 15px #00f2ff;
        }
        .num-box.hidden { background: #555; color: transparent; box-shadow: none; }
    </style>
</head>
<body>
    <h1>CHIMPA TEST</h1>
    <p>Clica els números en ordre: 1, 2, 3...</p>
    <div id="status">Nivell: <span id="level">1</span> | Punts: <span id="score">0</span></div>

    <div id="game-container"></div>

    <script>
        let currentLevel = 3; // Empezamos con 3 números
        let nextNumber = 1;
        let score = 0;
        const container = document.getElementById('game-container');

        function startLevel() {
            container.innerHTML = '';
            nextNumber = 1;
            document.getElementById('level').innerText = currentLevel - 2;

            for (let i = 1; i <= currentLevel; i++) {
                const box = document.createElement('div');
                box.classList.add('num-box');
                box.innerText = i;

                // Posición aleatoria
                box.style.left = Math.random() * (container.clientWidth - 70) + 'px';
                box.style.top = Math.random() * (container.clientHeight - 70) + 'px';

                box.onclick = () => checkNumber(i, box);
                container.appendChild(box);
            }
        }

        function checkNumber(num, element) {
            if (num === nextNumber) {
                // Si es el primer número, ocultamos los demás (estilo Chimpa)
                if (num === 1) {
                    document.querySelectorAll('.num-box').forEach(b => b.classList.add('hidden'));
                }

                element.style.visibility = 'hidden';
                nextNumber++;
                score += 10;
                document.getElementById('score').innerText = score;

                if (nextNumber > currentLevel) {
                    currentLevel++;
                    setTimeout(startLevel, 500);
                }
            } else {
                alert("ERROR! Tornant a començar...");
                finalitzarPartida();
            }
        }

        function finalitzarPartida() {
			fetch('/finalitzar_joc', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({
					username: "{{ username }}", // Este valor viene de render_template
					joc: "Chimpa Test",
					puntuacio: score
				})
			}).then(() => {
				window.location.href = "/home";
			});
		}

        startLevel();
    </script>
</body>
</html>
