<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IC Games - Joc 1</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/joc1.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body data-words-url="{{ url_for('static', filename='data/joc1-paraules.txt') }}">
    <aside class="joc1-topbar">
        <div class="joc1-session">
            <div class="joc1-user-info">
                <span class="joc1-user-label">Usuari connectat</span>
                <strong class="joc1-user-name">{{ usuari }}</strong>
            </div>

            <div class="joc1-session__actions">
                <a href="{{ url_for('home') }}" class="joc1-action joc1-action--ghost">Inici</a>
                <form action="{{ url_for('logout') }}" method="POST">
                    <button type="submit" class="joc1-action">Tanca la sessio</button>
                </form>
            </div>
        </div>
    </aside>

    <main class="joc1-page">
        <header class="joc1-hero">
            <p class="joc1-hero__eyebrow">Joc 1</p>
            <h1 class="joc1-hero__title">Flux de Paraules</h1>
        </header>

        <section class="joc1-card joc1-card--play">
            <div class="joc1-hud">
                <div class="joc1-stat">
                    <span class="joc1-stat__label">Temps</span>
                    <strong class="joc1-stat__value" id="time-left">20.0</strong>
                </div>
                <div class="joc1-stat">
                    <span class="joc1-stat__label">Punts</span>
                    <strong class="joc1-stat__value" id="score">0</strong>
                </div>
                <div class="joc1-stat">
                    <span class="joc1-stat__label">Errors</span>
                    <strong class="joc1-stat__value" id="mistakes">0</strong>
                </div>
            </div>

            <div class="joc1-word-panel">
                <strong class="joc1-word-panel__word" id="current-word">carregant</strong>
            </div>

            <form id="word-form" class="joc1-form" autocomplete="off">
                <input
                    id="word-input"
                    class="joc1-form__input"
                    type="text"
                    name="word"
                    placeholder="Escriu aqui"
                    autocapitalize="off"
                    spellcheck="false"
                    maxlength="32"
                >
            </form>

            <p id="status-text" class="joc1-status">Carregant paraules...</p>

            <div id="end-actions" class="joc1-end-actions" hidden="hidden">
                <button id="restart-button" class="joc1-end-action" type="button">Tornar a jugar</button>
                <a href="{{ url_for('home') }}" class="joc1-end-action">Tornar al menu</a>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/joc1.js') }}" defer></script>
</body>
</html>
