<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IC Games - Inici</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="home-background"></div>

    <aside class="home-page__topbar">
        <div class="home-page__session">
            <div class="home-page__user-info">
                <span class="home-page__user-label">Usuari connectat</span>
                <strong class="home-page__user-name">{{ usuari }}</strong>
            </div>

            <form action="{{ url_for('logout') }}" method="POST" class="home-page__logout-form">
                <button type="submit" class="home-page__logout">Tanca la sessió</button>
            </form>
        </div>
    </aside>

    <main class="home-page">
        <header class="home-page__header">
            <h1 class="home-page__title">IC Games</h1>
            <p class="home-page__subtitle">Selecciona un mòdul des del panell principal</p>
        </header>

        <section class="home-grid">
            <a class="home-card home-card--link" href="{{ url_for('joc1') }}">
                <div class="home-card__content">
                    <h2 class="home-card__title">Flux de Paraules</h2>
                    <p class="home-card__text">Escriu tan rapid com puguis</p>
                    <span class="home-card__cta">Obre el joc</span>
                </div>
            </a>

            <a href="{{ url_for('joc2') }}" class="home-card home-card--link">
                <div class="home-card__content">
                    <h2 class="home-card__title">Neon Drift</h2>
                    <p class="home-card__text">Esquiva els obstales</p>
                    <span class="home-card__cta">Obre el joc</span>
                </div>
            </a>

            <a href="{{ url_for('joc3') }}" class="home-card home-card--link">
                <div class="home-card__content">
                    <h2 class="home-card__title">Sel·lecció en ordre</h2>
                    <p class="home-card__text">Recorda l'ordre</p>
                    <span class="home-card__cta">Obre el joc</span>
                </div>
            </a>
        </section>

        <div class="home-page__bottom-actions">
            <a href="{{ url_for('rankings') }}" class="btn-ranking-bottom">Consultar Rànkings</a>
        </div>
    </main>

</body>

</html>
