<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IC Games - Accés al sistema</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login_style.css') }}">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <div class="fons-animat"></div>

    <section class="seccio-login">
        
        <div class="targeta-login">
            
            <div class="contingut-targeta">
                <h1 class="titol-futurista">IC GAMES</h1>
                <p class="subtitol">Accés al sistema central</p>

                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                    {% for category, message in messages %}
                      <div class="alerta alerta-{{ category }}">{{ message }}</div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <form action="/" method="POST" class="formulari-login">
                    
                    <div class="grup-input">
                        <input type="text" id="username" name="username" required placeholder=" ">
                        <label for="username">Identificador d'Usuari</label>
                        <span class="linia-decorativa"></span>
                    </div>

                    <div class="grup-input">
                        <input type="password" id="password" name="password" required placeholder=" ">
                        <label for="password">Code d'accés</label>
                        <span class="linia-decorativa"></span>
                    </div>

                    <button type="submit" class="boto-futurista">
                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>
                        INICIAR PROTOCOL
                    </button>
                </form>
                
                <div class="peu-pagina">
                    <p>Nou usuari? <a href="{{ url_for('registre') }}">Registra't aquí</a></p>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
